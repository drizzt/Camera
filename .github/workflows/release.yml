name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: gradle

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/keystore.jks"

      - name: Write keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          {
            printf 'storeFile=keystore.jks\n'
            printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n'       "$KEY_ALIAS"
            printf 'keyPassword=%s\n'    "$KEY_PASSWORD"
            printf 'uploadKeyAlias=%s\n' "$KEY_ALIAS"
            printf 'uploadKeyPassword=%s\n' "$KEY_PASSWORD"
          } > "${{ github.workspace }}/keystore.properties"

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Wipe secrets from runner
        if: always()
        run: rm -f "${{ github.workspace }}/keystore.jks" "${{ github.workspace }}/keystore.properties"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
